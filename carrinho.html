<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrinho de Compras</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" type="text/css" href="carrinho.css">
</head>
<body>
    <h1>Carrinho de Compras</h1>
    <div class="cart">
        <h2>Itens no Carrinho</h2>
        <ul id="cart-items"></ul>
        <p>Total: R$ <span id="cart-total">0</span></p>
        <div class="delivery-options">
            <label>
                <input type="radio" name="delivery" value="delivery" checked> Entrega
            </label>
            <label>
                <input type="radio" name="delivery" value="pickup"> Retirar na Loja
            </label>
        </div>
        <a href="cardapio.html" class="back-to-catalog">Voltar ao Catálogo</a>
        <a href="#" id="send-whatsapp" class="send-whatsapp">Enviar para WhatsApp</a>
    </div>
    <script>
        let cart = JSON.parse(localStorage.getItem('cart')) || [];
        let total = cart.reduce((sum, item) => sum + item.price, 0);

        function updateCart() {
            const cartItems = document.getElementById('cart-items');
            const cartTotal = document.getElementById('cart-total');
            cartItems.innerHTML = '';
            cart.forEach((item, index) => {
                const li = document.createElement('li');
                li.textContent = `${item.product} - R$ ${item.price}`;
                const removeButton = document.createElement('button');
                removeButton.textContent = 'Excluir';
                removeButton.onclick = () => removeFromCart(index);
                li.appendChild(removeButton);
                cartItems.appendChild(li);
            });
            cartTotal.textContent = total;
            updateWhatsAppLink();
        }

        function removeFromCart(index) {
            total -= cart[index].price;
            cart.splice(index, 1);
            localStorage.setItem('cart', JSON.stringify(cart));
            updateCart();
        }

        function updateWhatsAppLink() {
            const sendWhatsApp = document.getElementById('send-whatsapp');
            let message = 'Itens no carrinho:%0A';
            cart.forEach(item => {
                message += `- ${item.product}: R$ ${item.price}%0A`;
            });
            message += `Total: R$ ${total}`;
            const deliveryOption = document.querySelector('input[name="delivery"]:checked').value;
            message += `%0AOpção de entrega: ${deliveryOption === 'delivery' ? 'Entrega' : 'Retirar na Loja'}`;
            sendWhatsApp.href = `https://api.whatsapp.com/send?phone=5565992242567&text=${message}`;
        }

        document.querySelectorAll('input[name="delivery"]').forEach(input => {
            input.addEventListener('change', updateWhatsAppLink);
        });

        updateCart();
    </script>
</body>
</html>
