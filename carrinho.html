<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrinho de Compras</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>Carrinho de Compras</h1>
    <div class="cart">
        <h2>Itens no Carrinho</h2>
        <ul id="cart-items"></ul>
        <p>Total: R$ <span id="cart-total">0</span></p>
        <a href="index.html" class="back-to-catalog">Voltar ao Catálogo</a>
        <a href="#" id="send-whatsapp" class="send-whatsapp">Enviar para WhatsApp</a>
    </div>
    <script>
        let cart = JSON.parse(localStorage.getItem('cart')) || [];
        let total = cart.reduce((sum, item) => sum + item.price, 0);

        function updateCart() {
            const cartItems = document.getElementById('cart-items');
            const cartTotal = document.getElementById('cart-total');
            cartItems.innerHTML = '';
            cart.forEach((item, index) => {
                const li = document.createElement('li');
                li.textContent = `${item.product} - R$ ${item.price} (Quantidade: ${item.quantity || 1})`;
                
                const addButton = document.createElement('button');
                addButton.textContent = '+';
                addButton.onclick = () => addToCart(index);
                
                const removeButton = document.createElement('button');
                removeButton.textContent = '-';
                removeButton.onclick = () => removeFromCart(index);
                
                li.appendChild(removeButton);
                li.appendChild(addButton);
                cartItems.appendChild(li);
            });
            cartTotal.textContent = total;
            updateWhatsAppLink();
        }

        function addToCart(index) {
            cart[index].quantity = (cart[index].quantity || 1) + 1; // Aumenta a quantidade
            total += cart[index].price; // Atualiza o total
            localStorage.setItem('cart', JSON.stringify(cart));
            updateCart();
        }

        function removeFromCart(index) {
            if (cart[index].quantity > 1) {
                cart[index].quantity -= 1; // Diminui a quantidade do item
                total -= cart[index].price; // Atualiza o total
            } else {
                total -= cart[index].price; // Atualiza o total
                cart.splice(index, 1); // Remove o item se a quantidade for 0
            }
            localStorage.setItem('cart', JSON.stringify(cart));
            updateCart();
        }

        function updateWhatsAppLink() {
            const sendWhatsApp = document.getElementById('send-whatsapp');
            let message = 'Itens no carrinho:%0A';
            cart.forEach(item => {
                message += `- ${item.product}: R$ ${item.price} (Quantidade: ${item.quantity || 1})%0A`;
            });
            message += `Total: R$ ${total}`;
            sendWhatsApp.href = `https://api.whatsapp.com/send?phone=5565992242567&text=${message}`;
        }

        updateCart();
    </script>
</body>
</html>
