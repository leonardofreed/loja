<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo de Produtos</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>Catálogo de Produtos</h1>
    <div class="catalog" id="catalog"></div>
    <a href="carrinho.html" class="view-cart" id="view-cart">Ver Carrinho (<span id="cart-count-btn">0</span> itens - <span id="cart-total-btn">R$ 0.00</span>)</a>
    <script>
        let cart = JSON.parse(localStorage.getItem('cart')) || [];
        let total = cart.reduce((sum, item) => sum + item.price, 0);

        function updateCartSummary() {
            document.getElementById('cart-count-btn').textContent = cart.length;
            document.getElementById('cart-total-btn').textContent = `R$ ${total.toFixed(2)}`;
        }

        function addToCart(product, price) {
            cart.push({ product, price });
            total += price;
            localStorage.setItem('cart', JSON.stringify(cart));
            alert('Produto adicionado ao carrinho!');
            updateCartSummary();
        }

        function loadProducts() {
            fetch('fetch_products.php')
                .then(response => response.json())
                .then(data => {
                    const catalog = document.getElementById('catalog');
                    data.forEach(product => {
                        const productDiv = document.createElement('div');
                        productDiv.classList.add('product');
                        productDiv.innerHTML = `
                            <img src="${product.imagem}" alt="${product.nome}">
                            <h2>${product.nome}</h2>
                            <p>${product.descricao}</p>
                            <p class="price">R$ ${parseFloat(product.preco).toFixed(2)}</p>
                            <button onclick="addToCart('${product.nome}', ${parseFloat(product.preco)})">Adicionar ao Carrinho</button>
                        `;
                        catalog.appendChild(productDiv);
                    });
                })
                .catch(error => console.error('Error fetching products:', error));
        }

        document.addEventListener('DOMContentLoaded', () => {
            loadProducts();
            updateCartSummary();
        });
    </script>
</body>
</html>
