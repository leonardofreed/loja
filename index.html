<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo de Produtos</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>Catálogo de Produtos</h1>
    <div class="cart-summary">
        <h2>Resumo do Carrinho</h2>
        <ul id="cart-summary-items"></ul>
        <p>Total: R$ <span id="cart-summary-total">0</span></p>
    </div>

    <div class="catalog">
        <div class="product">
            <img src="https://bing.com/th?id=OSK.942ee464125395c0960cb6b1f8a87dc7" alt="Produto 1">
            <h2>Produto 1</h2>
            <p>Descrição do produto 1.</p>
            <p class="price">R$ 100,00</p>
            <button onclick="addToCart('Produto 1', 100)">Adicionar ao Carrinho</button>
        </div>
        <div class="product">
            <img src="https://bing.com/th?id=OSK.942ee464125395c0960cb6b1f8a87dc7" alt="Produto 2">
            <h2>Produto 2</h2>
            <p>Descrição do produto 2.</p>
            <p class="price">R$ 150,00</p>
            <button onclick="addToCart('Produto 2', 150)">Adicionar ao Carrinho</button>
        </div>
        <div class="product">
            <img src="https://bing.com/th?id=OSK.942ee464125395c0960cb6b1f8a87dc7" alt="Produto 3">
            <h2>Produto 3</h2>
            <p>Descrição do produto 3.</p>
            <p class="price">R$ 201,00</p>
            <button onclick="addToCart('Produto 3', 200)">Adicionar ao Carrinho</button>
        </div>
        <!-- Adicione mais produtos conforme necessário -->
    </div>
    <a href="carrinho.html" class="view-cart">Ver Carrinho</a>
    <script>
        function updateCartSummary() {
            const cart = JSON.parse(localStorage.getItem('cart')) || [];
            const cartSummaryItems = document.getElementById('cart-summary-items');
            const cartSummaryTotal = document.getElementById('cart-summary-total');
            cartSummaryItems.innerHTML = '';
            let total = 0;

            cart.forEach(item => {
                const li = document.createElement('li');
                li.textContent = `${item.product} - R$ ${item.price}`;
                cartSummaryItems.appendChild(li);
                total += item.price;
            });

            cartSummaryTotal.textContent = total;
        }

        // Chamar a função para atualizar o resumo do carrinho ao carregar a página
        updateCartSummary();

        let cart = JSON.parse(localStorage.getItem('cart')) || [];
        let total = cart.reduce((sum, item) => sum + item.price, 0);

        function addToCart(product, price) {
            cart.push({ product, price });
            total += price;
            localStorage.setItem('cart', JSON.stringify(cart));
            alert('Produto adicionado ao carrinho!');
        }
    </script>
</body>
</html>
